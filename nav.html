    <!-- Bootstrap CSS -->

    <style>
        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .bg-light-theme {
            background-color: #f8f9fa;
            color: #333;
        }

            background-color: #333;

        }

            color: #333;
        }

        .navbar-dark .navbar-brand {
            color: #333 !important;
        }

        .navbar-dark .navbar-brand:hover {
            color: #555 !important;
        }

        .navbar-toggler-icon {
            background-color: #333 !important;
        }

        .navbar-toggler-icon:hover {
            background-color: #555 !important;
        }

        .navbar-nav .nav-link:hover {
            color: #555;
        }

        .navbar-toggler-icon.close {
            display: none;
        }

        .navbar-toggler:not(.collapsed) .navbar-toggler-icon.close {
            display: block;
        }

        .navbar-toggler:not(.collapsed) .navbar-toggler-icon.hamburger {
            display: none;
        }

        .navbar-toggler.collapsed .navbar-toggler-icon.hamburger {
            display: block;
        }

        .navbar-toggler.collapsed .navbar-toggler-icon.close {
            display: none;
