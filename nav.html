<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guy Orlov | Data Analyst</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Apply Inter font to the body with a regular (light) weight */
        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400; /* Light font */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Default background style */
        .bg-light-theme {
            background-color: #f8f9fa;
            color: #333;
        }

        /* Dark background style */
        .bg-dark-theme {
            background-color: #333;
            color: #f8f9fa;
        }

        /* Make navbar items lighter and change text color to light black */
        .navbar-nav .nav-link {
            font-weight: 400; /* Light font */
            color: #333; /* Light black color */
        }

        /* For mobile navigation (navbar brand) */
        .navbar-dark .navbar-brand {
            color: #333 !important; /* Set the text color for mobile */
        }

        .navbar-dark .navbar-brand:hover {
            color: #555 !important; /* Set the hover color */
        }

        /* Change the color of the menu icon in mobile view */
        .navbar-toggler-icon {
            background-color: #333 !important; /* Dark color for the hamburger icon */
        }

        /* Optional: Change the color of the icon when hovered */
        .navbar-toggler-icon:hover {
            background-color: #555 !important; /* Darker grey when hovering over the icon */
        }

        /* Hover effect for nav links */
        .navbar-nav .nav-link:hover {
            color: #555; /* Darker grey on hover */
        }

        /* Custom Theme Switcher Toggle Styles */
        .theme-switcher-container {
            display: flex;
            align-items: center;
            margin-top: 20px;
        }

        /* Create the toggle switch */
        .theme-switcher {
            position: relative;
            width: 60px;
            height: 34px;
        }

        /* Hide the default checkbox input */
        .theme-switcher input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Style the slider (the toggle itself) */
        .theme-switcher .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        /* Create the circle inside the slider */
        .theme-switcher .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            border-radius: 50%;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
        }

        /* Change the background of the slider when checked (for dark theme) */
        .theme-switcher input:checked + .slider {
            background-color: #333;
        }

        /* Move the circle inside the slider when checked */
        .theme-switcher input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Optionally add a light/dark icon label */
        .theme-switcher-label {
            margin-left: 10px;
            color: #333;
        }
    </style>
</head>
<body class="bg-light-theme">

<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="sideNav" aria-label="Main navigation">
    <a class="navbar-brand js-scroll-trigger" href="/index.html#page-top">
        <span class="d-block d-lg-none">Guy Orlov | Data Analyst</span>
        <span class="d-none d-lg-block">
            <img class="img-fluid img-profile rounded-circle mx-auto mb-2" src="/img/profile.jpg" alt="Guy Orlov Profile Photo" loading="lazy">
        </span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link js-scroll-trigger" href="/index.html#about">
                    <i class="fa-solid fa-circle-info" aria-hidden="true"></i> About
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link js-scroll-trigger" href="/portfolio.html">
                    <i class="fa-regular fa-folder-open" aria-hidden="true"></i> Portfolio
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link js-scroll-trigger" href="/services.html">
                    <i class="fas fa-tachometer-alt" aria-hidden="true"></i> Services
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link js-scroll-trigger" href="/index.html#testimonials">
                    <i class="fas fa-quote-left" aria-hidden="true"></i> Testimonials
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link js-scroll-trigger" href="/index.html#skills">
                    <i class="fa-solid fa-brain" aria-hidden="true"></i> Skills
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link js-scroll-trigger" href="/index.html#certifications">
                    <i class="fa-solid fa-star" aria-hidden="true"></i> Certifications
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link js-scroll-trigger" href="/index.html#contact">
                    <i class="fa-regular fa-message" aria-hidden="true"></i> Contact
                </a>
            </li>

            <!-- Theme Switcher Button inside the navbar -->
            <li class="nav-item theme-switcher-container">
                <label class="theme-switcher">
                    <input type="checkbox" onclick="toggleTheme()">
                    <span class="slider"></span>
                </label>
                <span class="theme-switcher-label">Switch Theme</span>
            </li>
        </ul>
    </div>
</nav>

<!-- Bootstrap JS (Optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Function to toggle between light and dark theme
    function toggleTheme() {
        var body = document.body;
        
        // Toggle between light and dark themes
        if (body.classList.contains('bg-light-theme')) {
            body.classList.remove('bg-light-theme');
            body.classList.add('bg-dark-theme');
        } else {
            body.classList.remove('bg-dark-theme');
            body.classList.add('bg-light-theme');
        }
    }
</script>

</body>
</html>
